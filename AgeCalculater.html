<!DOCTYPE html>
<html lang="en">
<head>
    <title>Age Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, rgb(221, 224, 223), rgb(46, 52, 82));
            text-align: center;
        }

        .container {
            background: white;
            padding: 25px;
            width: 290px;
            height: 350px;
            margin: 100px auto;
          border-radius: 5px;
            box-shadow: 0px 0px 15px black;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 80%;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            background-color: rgb(43, 60, 207);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #result {
            margin-top: 15px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Age Calculator</h2>

    <label>Enter Date of Birth:</label><br><br>

    <input type="date" id="dob"><br>

    <button onclick="calculateAge()">Calculate Age</button>

    <h3 id="result"></h3>
</div>

<script>
function calculateAge() {
    let dob = document.getElementById("dob").value;
    let result = document.getElementById("result");

    if (dob === "") {
        result.innerHTML = "Please select your date of birth!";
        return;
    }

    let birthDate = new Date(dob);
    let today = new Date();

    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();

    if (days < 0) {
        months--;
        let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    result.innerHTML = 
        "Your Age is: " + years + " Years, " + months + " Months, " + days + " Days";
}
</script>

</body>
</html>
